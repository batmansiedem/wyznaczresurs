<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 430" role="img" aria-label="Wizualizacja analizy resursu UTB">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    </pattern>
    <clipPath id="panel-clip">
      <rect x="370" y="68" width="176" height="300" rx="6"/>
    </clipPath>
  </defs>

  <!-- Tło z siatką -->
  <rect width="560" height="430" fill="url(#grid)"/>

  <!-- Nagłówek -->
  <text x="22" y="30" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="4">ANALIZA RESURSU UTB</text>
  <line x1="0" y1="44" x2="560" y2="44" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- ===== LICZNIK (GAUGE) ===== -->
  <!-- Centrum: (195, 265), Promień: 130, Półkole górne -->

  <!-- Tor tła — pełne półkole od lewej do prawej przez górę -->
  <path d="M 65 265 A 130 130 0 0 1 325 265"
    fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="18" stroke-linecap="round"/>

  <!-- Strefa 50% — znacznik -->
  <line x1="195" y1="129" x2="195" y2="142" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Strefa 75% — znacznik (kąt od +x: 45°, punkt: ~287,173) -->
  <line x1="280" y1="169" x2="289" y2="160" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Łuk postępu — 73% (kąt: 131.4° od lewej, punkt końcowy: 281,168) -->
  <path d="M 65 265 A 130 130 0 0 1 281 168"
    fill="none" stroke="rgba(255,255,255,0.90)" stroke-width="18" stroke-linecap="round"/>

  <!-- Świetlna końcówka -->
  <circle cx="281" cy="168" r="12" fill="rgba(255,255,255,0.18)"/>
  <circle cx="281" cy="168" r="6"  fill="rgba(255,255,255,0.70)"/>

  <!-- Wartość centralna -->
  <text x="195" y="256" text-anchor="middle" font-family="monospace"
    font-size="56" font-weight="bold" fill="white">73%</text>
  <text x="195" y="278" text-anchor="middle" font-family="sans-serif"
    font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="3">RESURS ZUŻYTY</text>

  <!-- Etykiety 0% i 100% -->
  <text x="58"  y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.28)">0%</text>
  <text x="332" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.28)">100%</text>

  <!-- Status pill pod licznikiem -->
  <rect x="140" y="302" width="110" height="26" rx="5"
    fill="rgba(230,81,0,0.18)" stroke="rgba(255,160,80,0.45)" stroke-width="1"/>
  <text x="195" y="319" text-anchor="middle" font-family="sans-serif"
    font-size="9" font-weight="bold" fill="rgba(255,165,80,1)">WYMAGA UWAGI</text>

  <!-- ===== SEPARATOR PIONOWY ===== -->
  <line x1="358" y1="55" x2="358" y2="395" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ===== PANEL DANYCH (PRAWY) ===== -->
  <rect x="370" y="68" width="176" height="300" rx="6"
    fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- Nagłówek panelu -->
  <text x="387" y="91" font-family="monospace" font-size="9"
    fill="rgba(255,255,255,0.38)" letter-spacing="3">PARAMETRY</text>
  <line x1="370" y1="101" x2="546" y2="101" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Wiersz 1: Zdolność cyklowa -->
  <text x="387" y="124" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.42)">Zdolność cyklowa</text>
  <text x="539" y="124" text-anchor="end" font-family="monospace" font-size="12" font-weight="bold" fill="white">125 840</text>
  <line x1="387" y1="132" x2="539" y2="132" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Wiersz 2: Cykle faktyczne -->
  <text x="387" y="153" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.42)">Cykle faktyczne</text>
  <text x="539" y="153" text-anchor="end" font-family="monospace" font-size="12" font-weight="bold" fill="white">91 900</text>
  <line x1="387" y1="161" x2="539" y2="161" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Wiersz 3: Stan obciążenia -->
  <text x="387" y="182" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.42)">Stan obciążenia</text>
  <text x="539" y="182" text-anchor="end" font-family="monospace" font-size="11" fill="rgba(255,200,80,0.92)">Q2 / Średni</text>
  <line x1="387" y1="190" x2="539" y2="190" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Wiersz 4: Współczynnik F_X -->
  <text x="387" y="211" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.42)">Współczynnik F_X</text>
  <text x="539" y="211" text-anchor="end" font-family="monospace" font-size="12" font-weight="bold" fill="white">1.30</text>
  <line x1="387" y1="219" x2="539" y2="219" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Wiersz 5: Wynik kss -->
  <text x="387" y="240" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.42)">Wynik badania kss</text>
  <text x="539" y="240" text-anchor="end" font-family="monospace" font-size="12" fill="rgba(120,220,120,0.92)">0.50</text>
  <line x1="387" y1="248" x2="539" y2="248" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Wiersz 6: Prognoza resursu -->
  <text x="387" y="269" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.42)">Prognoza resursu</text>
  <text x="539" y="269" text-anchor="end" font-family="monospace" font-size="12" fill="rgba(150,205,255,0.92)">2027-08</text>

  <!-- Separator -->
  <line x1="370" y1="283" x2="546" y2="283" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Status badge w panelu -->
  <rect x="384" y="292" width="148" height="30" rx="5"
    fill="rgba(230,81,0,0.14)" stroke="rgba(255,160,80,0.42)" stroke-width="1"/>
  <text x="458" y="311" text-anchor="middle" font-family="sans-serif"
    font-size="10" font-weight="bold" fill="rgba(255,165,80,1)">⚠  WYMAGA UWAGI</text>

  <!-- Separator -->
  <line x1="370" y1="334" x2="546" y2="334" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Dane urządzenia -->
  <text x="387" y="351" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.28)">Suwnica bramowa</text>
  <text x="387" y="364" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.18)">Nr fab.: SU-2019-04587</text>

  <!-- ===== PASKI MECHANIZMÓW (DÓŁ) ===== -->
  <line x1="20" y1="390" x2="540" y2="390" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Bar 1: Mech. Podnoszenia 73% -->
  <text x="22" y="409" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.32)">PODNOSZENIA</text>
  <rect x="148" y="401" width="170" height="5" rx="2.5" fill="rgba(255,255,255,0.09)"/>
  <rect x="148" y="401" width="124" height="5" rx="2.5" fill="rgba(255,255,255,0.82)"/>
  <text x="326" y="409" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.45)">73%</text>

  <!-- Bar 2: Mech. Jazdy 45% -->
  <text x="22" y="424" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.32)">JAZDY</text>
  <rect x="148" y="416" width="170" height="5" rx="2.5" fill="rgba(255,255,255,0.09)"/>
  <rect x="148" y="416" width="76"  height="5" rx="2.5" fill="rgba(255,255,255,0.82)"/>
  <text x="326" y="424" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.45)">45%</text>
</svg>
